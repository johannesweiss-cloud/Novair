<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Novair | Dein Rauchfrei-Begleiter</title>
  
  <!-- CSS Frameworks & Icons -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <!-- Custom Styles -->
  <link rel="stylesheet" href="css/style.css">
  
  <!-- Vercel Web Analytics -->
  <script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
  
  <!-- Vercel Speed Insights -->
  <script>
    window.si = window.si || function () { (window.siq = window.siq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/speed-insights/script.js"></script>
</head>
<body class="min-h-screen flex flex-col items-center">

  <!-- Welcome View -->
  <div id="welcome-view" class="flex-1 flex flex-col items-center justify-center w-full max-w-xl text-center px-6 hidden min-h-screen">
    <h1 class="text-6xl md:text-8xl font-black tracking-tighter mb-4">Novair</h1>
    <p class="text-xl md:text-2xl text-gray-500 font-light mb-16">Der einfachste Weg in dein rauchfreies Leben.</p>
    <button id="start-btn" class="w-full bg-black text-white hover:bg-gray-800 rounded-full px-8 py-5 text-xl font-medium transition-transform hover:scale-[1.02] active:scale-95 shadow-xl flex items-center justify-center space-x-3">
      <span>Ich bin bereit: Jetzt aufhören</span>
      <i data-lucide="arrow-right" class="w-6 h-6"></i>
    </button>
  </div>

  <!-- Dashboard View -->
  <div id="dashboard-view" class="w-full max-w-3xl flex flex-col items-center hidden p-4 md:p-8">
    
    <header class="w-full mb-10 text-center pt-4 md:pt-8">
      <h1 class="text-4xl md:text-5xl font-black tracking-tighter mb-2">Novair</h1>
      <p class="text-gray-500 font-light text-lg">Ein Tag nach dem anderen.</p>
    </header>

    <main class="w-full space-y-6 pb-32">
      
      <!-- Stats Dashboard -->
      <div class="clean-card rounded-3xl p-8 md:p-12 text-center flex flex-col items-center justify-center shadow-sm">
        <p class="text-gray-400 text-xs uppercase tracking-widest mb-2 font-bold">Rauchfrei seit</p>
        <div id="stat-days" class="text-7xl md:text-9xl font-black tracking-tighter mt-2 mb-2">0</div>
        <p class="text-gray-500 font-medium mb-6">Tage</p>
        <div id="stat-seconds-ticker" class="text-gray-400 font-light text-sm md:text-base tabular-nums">0 Stunden, 0 Minuten, 0 Sekunden</div>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="clean-card rounded-2xl p-8 flex flex-col items-center text-center shadow-sm">
          <p class="text-gray-400 text-xs uppercase tracking-widest mb-2 font-bold flex items-center">
            <i data-lucide="wallet" class="w-3 h-3 mr-1.5"></i> Geld gespart
          </p>
          <div id="stat-money" class="text-4xl md:text-5xl font-bold mt-2 tracking-tight">0,00 €</div>
        </div>
        <div class="clean-card rounded-2xl p-8 flex flex-col items-center text-center shadow-sm">
          <p class="text-gray-400 text-xs uppercase tracking-widest mb-2 font-bold flex items-center">
            <i data-lucide="ban" class="w-3 h-3 mr-1.5"></i> Nicht geraucht
          </p>
          <div id="stat-avoided" class="text-4xl md:text-5xl font-bold mt-2 tracking-tight">0</div>
          <p class="text-gray-400 text-xs mt-3 font-medium">Zigaretten</p>
        </div>
      </div>

      <!-- Settings / Config -->
      <div class="clean-card rounded-2xl p-6 md:p-8 shadow-sm">
        <div class="grid grid-cols-2 md:grid-cols-4 gap-6">
          <div class="col-span-2 md:col-span-4">
            <label class="flex items-center text-xs font-bold text-gray-400 uppercase tracking-widest mb-3">
              <i data-lucide="heart" class="w-3 h-3 mr-1.5"></i> Wofür hörst du auf?
            </label>
            <input type="text" id="motivation-text" placeholder="z.B. Für meine Gesundheit" class="w-full min-h-[48px] bg-transparent border-0 border-b border-gray-200 focus:border-black focus:ring-0 text-xl md:text-2xl font-semibold px-0 py-2 transition-colors outline-none">
          </div>
          <div class="col-span-2 md:col-span-4">
            <label class="flex items-center text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">
              <i data-lucide="calendar" class="w-3 h-3 mr-1.5"></i> Startzeitpunkt (Editierbar)
            </label>
            <input type="datetime-local" id="quit-date" step="1" class="w-full min-h-[48px] bg-gray-50 border border-gray-200 rounded-xl px-4 py-2.5 focus:outline-none focus:border-black focus:ring-1 focus:ring-black text-sm font-medium transition-shadow">
          </div>
          <div class="col-span-2 md:col-span-2">
            <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">Preis / Packung (€)</label>
            <input type="number" id="price-per-pack" step="0.10" min="0" placeholder="z.B. 8.00" class="w-full min-h-[48px] bg-gray-50 border border-gray-200 rounded-xl px-4 py-2.5 focus:outline-none focus:border-black focus:ring-1 focus:ring-black text-sm font-medium transition-shadow">
          </div>
          <div class="col-span-1 md:col-span-1">
            <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">Zigaretten / Tag</label>
            <input type="number" id="cigs-per-day" min="1" placeholder="z.B. 15" class="w-full min-h-[48px] bg-gray-50 border border-gray-200 rounded-xl px-4 py-2.5 focus:outline-none focus:border-black focus:ring-1 focus:ring-black text-sm font-medium transition-shadow">
          </div>
          <div class="col-span-1 md:col-span-1">
            <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">Zig. / Packung</label>
            <input type="number" id="cigs-per-pack" min="1" placeholder="z.B. 20" class="w-full min-h-[48px] bg-gray-50 border border-gray-200 rounded-xl px-4 py-2.5 focus:outline-none focus:border-black focus:ring-1 focus:ring-black text-sm font-medium transition-shadow">
          </div>
        </div>
      </div>

      <!-- Health Milestones -->
      <div class="clean-card rounded-2xl p-6 md:p-8 shadow-sm">
        <h3 class="text-xl font-bold mb-8 flex items-center text-black">
          <i data-lucide="activity" class="w-5 h-5 mr-2.5"></i> So erholt sich dein Körper
        </h3>
        <div id="health-milestones" class="space-y-6 max-h-[400px] overflow-y-auto pr-4">
          <!-- Milestones injected via JS -->
        </div>
      </div>

      <!-- Gamification / Erfolge -->
      <div class="clean-card rounded-2xl p-6 md:p-8 shadow-sm">
        <h3 class="text-xl font-bold mb-8 flex items-center text-black">
          <i data-lucide="award" class="w-5 h-5 mr-2.5"></i> Deine Erfolge
        </h3>
        <div id="badges-container" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4 md:gap-5">
          <!-- Badges injected via JS -->
        </div>
      </div>

    </main>

    <!-- Urge Surfing Button Fixed Bottom -->
    <div class="fixed bottom-0 left-0 right-0 p-6 flex justify-center bg-gradient-to-t from-white via-white to-transparent pointer-events-none">
      <button onclick="toggleCravingModal()" class="pointer-events-auto bg-black text-white hover:bg-gray-800 rounded-full px-8 py-5 font-medium transition-transform hover:scale-[1.02] active:scale-95 shadow-2xl flex items-center space-x-3">
        <i data-lucide="wind" class="w-5 h-5"></i>
        <span>Akutes Verlangen?</span>
      </button>
    </div>

  </div>

  <!-- Craving Modal -->
  <div id="craving-modal" class="fixed inset-0 bg-white z-50 hidden flex-col items-center justify-center transition-opacity">
    <h2 class="text-3xl md:text-5xl font-bold mb-6 text-center px-4 tracking-tight">
      Urge Surfing
      <span class="text-lg md:text-xl font-light text-gray-500 mt-4 block">4s Einatmen - 4s Halten - 8s Ausatmen</span>
    </h2>
    
    <div class="relative w-64 h-64 md:w-80 md:h-80 flex items-center justify-center mb-16 mt-8">
      <div class="absolute inset-0 bg-gray-100 rounded-full breathing-circle"></div>
      <div class="absolute w-32 h-32 md:w-40 md:h-40 bg-black rounded-full flex items-center justify-center z-10 shadow-2xl">
        <span class="text-white font-medium text-xl md:text-2xl breathing-text tracking-wide text-center"></span>
      </div>
    </div>
    
    <button onclick="toggleCravingModal()" class="bg-gray-100 hover:bg-gray-200 border border-gray-200 text-black rounded-full px-10 py-4 font-medium transition-all hover:scale-[1.02] active:scale-95">
      Ich habe es geschafft
    </button>
  </div>

  <!-- Custom Scripts -->
  <script src="js/app.js"></script>
</body>
</html>
