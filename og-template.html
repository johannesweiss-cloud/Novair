<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Novair OG Image</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;900&display=swap');
    body {
      margin: 0;
      width: 1200px;
      height: 630px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #10b981 0%, #047857 100%);
      font-family: 'Inter', sans-serif;
      color: white;
      text-align: center;
    }
    h1 {
      font-size: 160px;
      font-weight: 900;
      margin: 0;
      letter-spacing: -6px;
      text-shadow: 0 10px 30px rgba(0,0,0,0.15);
    }
    p {
      font-size: 52px;
      font-weight: 300;
      margin: 10px 0 0 0;
      opacity: 0.95;
      letter-spacing: -1px;
      text-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>
  <h1>Novair</h1>
  <p>Dein Rauchfrei-Begleiter</p>
</body>
</html>
